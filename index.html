<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Rexcel Jay A. Lusica — Full Stack Developer specializing in Laravel, React, MySQL, and Cybersecurity." />
  <title>Rexcel Jay A. Lusica — Full Stack Developer</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Stylesheet -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Loader (static HTML for speed; React takes over after) -->
  <div id="loader" aria-busy="true" aria-label="Loading portfolio">
    <div id="loader-grid" aria-hidden="true"></div>
    <div id="loader-glow" aria-hidden="true"></div>

    <div class="loader-ring ring1" aria-hidden="true"><div class="ring-dot"></div></div>
    <div class="loader-ring ring2" aria-hidden="true"><div class="ring-dot"></div></div>
    <div class="loader-ring ring3" aria-hidden="true"><div class="ring-dot"></div></div>

    <div id="loader-avatar" aria-hidden="true">
      <!-- Inline SVG placeholder avatar -->
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" width="100" height="100" role="img" aria-label="Profile photo placeholder">
        <defs>
          <linearGradient id="lg-av" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#2563EB"/>
            <stop offset="50%" stop-color="#8B5CF6"/>
            <stop offset="100%" stop-color="#10B981"/>
          </linearGradient>
          <clipPath id="circ"><circle cx="50" cy="50" r="50"/></clipPath>
        </defs>
        <circle cx="50" cy="50" r="50" fill="url(#lg-av)"/>
        <circle cx="50" cy="38" r="16" fill="rgba(255,255,255,0.25)"/>
        <ellipse cx="50" cy="80" rx="28" ry="18" fill="rgba(255,255,255,0.20)" clip-path="url(#circ)"/>
        <text x="50" y="45" text-anchor="middle" dominant-baseline="middle"
              font-family="Syne, sans-serif" font-size="22" font-weight="800" fill="#fff" opacity="0.9">RJL</text>
      </svg>
      <img id="loader-ph-img" alt="" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:50%;opacity:0;transition:opacity .3s" />
    </div>

    <div id="loader-text">
      <div id="loader-name">Rexcel Jay A. Lusica</div>
      <div id="loader-role">Full Stack Developer</div>
      <div id="loader-tagline">Building elegant systems — one commit at a time.</div>
    </div>

    <div id="loader-track">
      <div id="loader-label">
        <span id="loader-status-lbl">Initializing…</span>
        <span id="loader-pct-lbl">0%</span>
      </div>
      <div id="loader-bar-bg"><div id="loader-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div></div>
    </div>
    <div id="loader-status" aria-live="polite"></div>

    <button id="loader-skip" onclick="skipLoader()" aria-label="Skip loading animation">Skip intro →</button>
    <label id="loader-img-hint" for="loader-file-input">📷 Upload your photo</label>
    <input type="file" id="loader-file-input" accept="image/*" aria-label="Upload profile photo" />
  </div>

  <!-- Scroll progress indicator -->
  <div id="prog" role="progressbar" aria-label="Page scroll progress" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>

  <!-- React root -->
  <div id="root"></div>

  <!-- Toast notification (outside React for simplicity) -->
  <div id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

  <!-- React + Babel (CDN) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Loader bootstrap (vanilla JS; runs before React) -->
  <script src="loader.js"></script>

  <!-- Main React app (transpiled by Babel) -->
  <script type="text/babel" src="app.jsx" data-presets="react"></script>
</body>
</html>
